<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Price Monitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f8fb;color:#222}
.wrap{max-width:1440px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px}
.title{font-size:24px;font-weight:700}
.muted{color:#666;font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab-btn{border:1px solid #d8dce5;background:#fff;color:#666;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:600}
.tab-btn.active{background:#3182F6;color:#fff;border-color:#3182F6}
.panel{display:none}
.panel.active{display:block}
.card{background:#fff;border:1px solid #e3e8f2;border-radius:14px;padding:16px;margin-bottom:14px}
.card-title{font-size:16px;font-weight:700;margin-bottom:12px}
.status-grid{display:grid;grid-template-columns:180px 1fr auto;gap:14px;align-items:center}
.pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.pill.idle{background:#eef3ff;color:#3182F6}
.pill.running{background:#e8faf6;color:#00B493}
.pill.done{background:#e9f7ef;color:#1a8f47}
.pill.error{background:#fdecee;color:#F04452}
.pill.stopping{background:#fff4e8;color:#e8861a}
.progress-wrap{height:10px;background:#edf1f7;border-radius:999px;overflow:hidden}
.progress-bar{height:100%;background:#3182F6;transition:width .25s}
.btn{border:none;border-radius:10px;padding:9px 14px;font-weight:700;cursor:pointer}
.btn.primary{background:#3182F6;color:#fff}
.btn.danger{background:#F04452;color:#fff}
.btn.ghost{background:#eef2f9;color:#42526b}
.btn:disabled{opacity:.6;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px;border-bottom:1px solid #eef1f6;text-align:left;vertical-align:top}
th{background:#f8fafd;color:#666;font-size:12px}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.up{color:#F04452;font-weight:700}
.down{color:#3182F6;font-weight:700}
.grid5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.day-col{background:#fff;border:1px solid #e3e8f2;border-radius:12px;padding:10px;min-height:280px}
.day-title{font-size:13px;font-weight:700;margin-bottom:8px;color:#444}
.sku-item{display:flex;justify-content:space-between;gap:8px;padding:7px 8px;border:1px solid #eef1f6;border-radius:8px;background:#fbfcff;margin-bottom:7px}
.sku-name{font-size:12px;color:#444;line-height:1.35}
.x-btn{background:none;border:none;color:#F04452;font-weight:700;cursor:pointer}
.empty{color:#9aa3b2;font-size:12px;padding:6px 2px}
.target-list{margin-top:8px;font-size:12px;color:#666;max-height:110px;overflow:auto}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.err{display:none;background:#fdecee;color:#ba1e2d;padding:10px;border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="title">Price Monitor</div>
      <div class="muted">수집 대시보드 + 스케줄 관리</div>
    </div>
    <div class="muted" id="refreshedAt"></div>
  </div>

  <div id="errBox" class="err"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dashboard">대시보드</button>
    <button class="tab-btn" data-tab="schedule">수집 스케줄</button>
    <button class="tab-btn" data-tab="sku">SKU 리스트</button>
  </div>

  <section class="panel active" data-panel="dashboard">
    <div class="card">
      <div class="card-title">수집 현황</div>
      <div class="status-grid">
        <div>
          <div class="muted">현재 상태</div>
          <div id="statusLabel" class="pill idle">대기중</div>
        </div>
        <div>
          <div class="progress-wrap"><div id="progressBar" class="progress-bar" style="width:0%"></div></div>
          <div class="muted" id="progressText" style="margin-top:6px">0/0</div>
        </div>
        <div class="row">
          <button id="startCollectBtn" class="btn primary">수집 시작</button>
          <button id="stopCollectBtn" class="btn danger">중지</button>
        </div>
      </div>
      <div id="todayTargets" class="target-list"></div>
    </div>

    <div class="card">
      <div class="card-title">가격 변동 알림</div>
      <table>
        <thead>
          <tr>
            <th>SKU명</th>
            <th>브랜드</th>
            <th class="num">이전가격</th>
            <th class="num">변동가격</th>
            <th class="num">변동률(%)</th>
            <th>감지일시</th>
          </tr>
        </thead>
        <tbody id="alertTbody"></tbody>
      </table>
    </div>
  </section>

  <section class="panel" data-panel="schedule">
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0">요일별 수집 배정</div>
        <button id="autoDistributeBtn" class="btn ghost">자동 분배</button>
      </div>
      <div class="grid5" id="scheduleGrid"></div>
    </div>
    <div class="card">
      <div class="card-title">미배정 SKU</div>
      <table>
        <thead><tr><th>브랜드</th><th>SKU명</th><th>SKU ID</th><th class="num">현재가</th><th>마지막 수집</th></tr></thead>
        <tbody id="unassignedTbody"></tbody>
      </table>
    </div>
  </section>

  <section class="panel" data-panel="sku">
    <div class="card">
      <div class="card-title">SKU 리스트</div>
      <table>
        <thead>
          <tr>
            <th>브랜드</th>
            <th>SKU ID</th>
            <th>상품명</th>
            <th class="num">현재가</th>
            <th>마지막 수집</th>
            <th>URL</th>
          </tr>
        </thead>
        <tbody id="skuTbody"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
const API = '';
const DAY_META = [
  { d: 1, name: '월요일' },
  { d: 2, name: '화요일' },
  { d: 3, name: '수요일' },
  { d: 4, name: '목요일' },
  { d: 5, name: '금요일' },
];

const state = {
  skuList: [],
  alerts: [],
  status: null,
  scheduleByDay: { 1: [], 2: [], 3: [], 4: [], 5: [] },
};

function escapeHtml(v) {
  if (v == null) return '';
  return String(v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showErr(message) {
  const box = document.getElementById('errBox');
  box.style.display = 'block';
  box.textContent = message;
}

function hideErr() {
  const box = document.getElementById('errBox');
  box.style.display = 'none';
  box.textContent = '';
}

async function fetchJson(path, options) {
  const res = await fetch(API + path, options);
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) throw new Error(data.error || res.statusText || '요청 실패');
  return data;
}

function postJson(path, body) {
  return fetchJson(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

function patchJson(path, body) {
  return fetchJson(path, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

function deleteJson(path, body) {
  return fetchJson(path, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

function formatPrice(v) {
  if (v == null) return '—';
  return Number(v).toLocaleString('ko-KR');
}

function formatShortDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) {
    const s = String(iso).slice(0, 10);
    const t = s.split('-');
    return t.length === 3 ? `${Number(t[1])}/${Number(t[2])}` : '—';
  }
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function formatDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '—';
  return d.toLocaleString('ko-KR');
}

function statusMeta(status) {
  if (status === 'running') return { label: '수집중', cls: 'running' };
  if (status === 'done') return { label: '완료', cls: 'done' };
  if (status === 'error') return { label: '오류', cls: 'error' };
  if (status === 'stopping') return { label: '중지 요청', cls: 'stopping' };
  return { label: '대기중', cls: 'idle' };
}

function renderCollectStatus() {
  const s = state.status || {};
  const status = statusMeta(s.status);
  const total = Number(s.total) || 0;
  const current = Number(s.current) || 0;
  const pct = total > 0 ? Math.min(100, Math.round((current / total) * 100)) : 0;
  const currentName = s.current_sku_name ? ` (${s.current_sku_name})` : '';

  const label = document.getElementById('statusLabel');
  label.className = `pill ${status.cls}`;
  label.textContent = status.label;
  document.getElementById('progressBar').style.width = `${pct}%`;
  document.getElementById('progressText').textContent = `${current}/${total} 수집중...${currentName}`;
}

function renderAlerts() {
  const tbody = document.getElementById('alertTbody');
  const rows = state.alerts || [];
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">최근 변동이 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((a) => {
    const pct = Number(a.change_pct || 0);
    const cls = pct > 0 ? 'up' : pct < 0 ? 'down' : '';
    const sign = pct > 0 ? '+' : '';
    return `<tr>
      <td>${escapeHtml(a.sku_name || a.sku_id)}</td>
      <td>${escapeHtml(a.brand || '')}</td>
      <td class="num">${formatPrice(a.prev_price)}</td>
      <td class="num">${formatPrice(a.new_price)}</td>
      <td class="num ${cls}">${sign}${pct.toFixed(2)}</td>
      <td>${escapeHtml(formatDateTime(a.detected_at))}</td>
    </tr>`;
  }).join('');
}

function renderSkuTable() {
  const tbody = document.getElementById('skuTbody');
  if (!state.skuList.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">SKU 데이터가 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = state.skuList.map((r) => {
    const url = r.product_url || `https://www.coupang.com/vp/products/${r.sku_id}`;
    return `<tr>
      <td>${escapeHtml(r.brand || '')}</td>
      <td>${escapeHtml(r.sku_id)}</td>
      <td>${escapeHtml(r.sku_name || '')}</td>
      <td class="num">${formatPrice(r.current_price)}</td>
      <td>${formatShortDate(r.last_collected)}</td>
      <td><a href="${escapeHtml(url)}" target="_blank" rel="noopener">링크</a></td>
    </tr>`;
  }).join('');
}

function assignedSet() {
  const s = new Set();
  for (const day of DAY_META) {
    for (const item of state.scheduleByDay[day.d] || []) s.add(item.sku_id);
  }
  return s;
}

function renderSchedule() {
  const grid = document.getElementById('scheduleGrid');
  grid.innerHTML = DAY_META.map((meta) => {
    const rows = state.scheduleByDay[meta.d] || [];
    const items = rows.length
      ? rows.map((r) => `<div class="sku-item">
          <div class="sku-name">${escapeHtml(r.sku_name || r.sku_id)}</div>
          <button class="x-btn" data-day="${meta.d}" data-sku="${escapeHtml(r.sku_id)}">X</button>
        </div>`).join('')
      : '<div class="empty">배정된 SKU 없음</div>';
    return `<div class="day-col">
      <div class="day-title">${meta.name} (${rows.length})</div>
      ${items}
    </div>`;
  }).join('');

  grid.querySelectorAll('.x-btn').forEach((btn) => {
    btn.addEventListener('click', async () => {
      try {
        hideErr();
        await deleteJson('/api/collect-schedule', {
          day_of_week: Number(btn.dataset.day),
          sku_id: btn.dataset.sku,
        });
        await loadScheduleOnly();
      } catch (e) {
        showErr(e.message || String(e));
      }
    });
  });

  const unassigned = state.skuList.filter((x) => !assignedSet().has(x.sku_id));
  const utb = document.getElementById('unassignedTbody');
  if (!unassigned.length) {
    utb.innerHTML = '<tr><td colspan="5" class="empty">미배정 SKU가 없습니다.</td></tr>';
  } else {
    utb.innerHTML = unassigned.map((r) => `<tr>
      <td>${escapeHtml(r.brand || '')}</td>
      <td>${escapeHtml(r.sku_name || '')}</td>
      <td>${escapeHtml(r.sku_id)}</td>
      <td class="num">${formatPrice(r.current_price)}</td>
      <td>${formatShortDate(r.last_collected)}</td>
    </tr>`).join('');
  }
}

function renderTodayTargets(rows) {
  const el = document.getElementById('todayTargets');
  if (!rows.length) {
    el.textContent = '오늘 배정된 SKU가 없습니다.';
    return;
  }
  const names = rows.map((x) => x.sku_name || x.sku_id).slice(0, 10).join(', ');
  const extra = rows.length > 10 ? ` 외 ${rows.length - 10}건` : '';
  el.textContent = `오늘 배정 ${rows.length}건: ${names}${extra}`;
}

async function loadScheduleOnly() {
  const reqs = DAY_META.map((d) => fetchJson(`/api/collect-schedule?day=${d.d}`));
  const results = await Promise.all(reqs);
  const next = { 1: [], 2: [], 3: [], 4: [], 5: [] };
  results.forEach((r) => {
    next[r.day_of_week] = r.data || [];
  });
  state.scheduleByDay = next;
  renderSchedule();
}

async function loadAll() {
  hideErr();
  const [sku, alerts, status] = await Promise.all([
    fetchJson('/api/sku-list'),
    fetchJson('/api/price-alert?days=14'),
    fetchJson('/api/collect-status'),
  ]);
  state.skuList = sku.data || [];
  state.alerts = alerts.alerts || [];
  state.status = status.data || null;
  await loadScheduleOnly();
  renderCollectStatus();
  renderAlerts();
  renderSkuTable();
  document.getElementById('refreshedAt').textContent = `갱신: ${new Date().toLocaleString('ko-KR')}`;
}

function bindTabs() {
  const tabs = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.panel');
  tabs.forEach((btn) => {
    btn.addEventListener('click', () => {
      tabs.forEach((t) => t.classList.remove('active'));
      panels.forEach((p) => p.classList.remove('active'));
      btn.classList.add('active');
      document.querySelector(`.panel[data-panel="${btn.dataset.tab}"]`).classList.add('active');
    });
  });
}

function bindActions() {
  document.getElementById('autoDistributeBtn').addEventListener('click', async () => {
    try {
      hideErr();
      await postJson('/api/collect-schedule', { action: 'auto_distribute' });
      await loadScheduleOnly();
    } catch (e) {
      showErr(e.message || String(e));
    }
  });

  document.getElementById('startCollectBtn').addEventListener('click', async () => {
    try {
      hideErr();
      const dayRes = await fetchJson('/api/collect-schedule?day=today');
      const rows = dayRes.data || [];
      renderTodayTargets(rows);
      await postJson('/api/collect-status', { action: 'start', total: rows.length });
      await refreshStatusOnly();
    } catch (e) {
      showErr(e.message || String(e));
    }
  });

  document.getElementById('stopCollectBtn').addEventListener('click', async () => {
    try {
      hideErr();
      await postJson('/api/collect-status', { action: 'stop' });
      await refreshStatusOnly();
    } catch (e) {
      showErr(e.message || String(e));
    }
  });

  window.testPatchStatus = (payload) => patchJson('/api/collect-status', payload);
}

async function refreshStatusOnly() {
  const status = await fetchJson('/api/collect-status');
  state.status = status.data || null;
  renderCollectStatus();
}

bindTabs();
bindActions();
loadAll().catch((e) => showErr(e.message || String(e)));
setInterval(() => {
  refreshStatusOnly().catch((e) => showErr(e.message || String(e)));
}, 5000);
setInterval(() => {
  loadAll().catch((e) => showErr(e.message || String(e)));
}, 60000);
</script>
</body>
</html>
