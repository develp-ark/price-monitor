<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Price Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:#f5f6fa;color:#333;font-size:14px;line-height:1.6}
.header{background:linear-gradient(135deg,#1a73e8 0%,#4285f4 100%);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(26,115,232,.3)}
.header h1{font-size:18px;color:#fff;font-weight:700;letter-spacing:-0.3px}
.header .sub{font-size:12px;color:rgba(255,255,255,.85)}
.wrap{max-width:1320px;margin:0 auto;padding:16px}
.summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.scard{background:linear-gradient(135deg,#f8f9ff 0%,#fff 100%);border-radius:12px;padding:14px;text-align:center;border:1px solid #e8eaed;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.scard .sl{font-size:11px;color:#5f6368;margin-bottom:4px;font-weight:500}
.scard .sv{font-size:22px;font-weight:700;color:#202124;font-variant-numeric:tabular-nums}
.scard .sv.blue{color:#1a73e8}
.scard .sv.red{color:#ea4335}
.scard .sv.green{color:#34a853}
.stitle{font-size:15px;font-weight:700;color:#202124;margin:24px 0 10px;padding-left:12px;border-left:4px solid #1a73e8}
.panel{background:#fff;border-radius:12px;border:1px solid #e8eaed;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;margin-bottom:16px}
.twrap{overflow-x:auto}
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th,table.data td{padding:10px 12px;text-align:left;border-bottom:1px solid #f1f3f4}
table.data th{background:#f8f9fa;color:#5f6368;font-weight:600;font-size:11px;white-space:nowrap}
table.data tr:hover{background:#f8faff}
table.data td.num{text-align:right;font-variant-numeric:tabular-nums}
.chg-up{color:#ea4335;font-weight:600}
.chg-down{color:#1a73e8;font-weight:600}
.muted{color:#9aa0a6;font-size:12px}
.err{background:#fce8e6;color:#c5221f;padding:12px 16px;border-radius:10px;margin-bottom:12px;font-size:13px}
.empty{padding:28px;text-align:center;color:#9aa0a6}
.badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;background:#e8f0fe;color:#1a73e8}
.upload-collapsible{background:#fff;border-radius:12px;border:1px solid #e8eaed;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.upload-collapse-hdr{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:none;background:#fafbfc;font-size:14px;font-weight:700;color:#202124;cursor:pointer;text-align:left;transition:background .15s;border-bottom:1px solid transparent}
.upload-collapse-hdr:hover{background:#f1f3f4}
.upload-collapse-hdr[aria-expanded="true"]{border-bottom-color:#e8eaed}
.upload-collapse-hdr .chev{font-size:11px;color:#5f6368;transition:transform .2s}
.upload-collapse-hdr[aria-expanded="true"] .chev{transform:rotate(180deg)}
.upload-collapse-body{padding:16px}
.drop-zone{border:2px dashed #c4c7cc;border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:background .15s,border-color .15s;outline:none}
.drop-zone:hover{border-color:#8ab4f8;background:#f8faff}
.drop-zone:focus-visible{box-shadow:0 0 0 2px rgba(26,115,232,.35)}
.drop-zone.dragover{background:#EBF3FE;border:2px solid #1a73e8;border-style:solid}
.drop-zone.uploading{cursor:wait;pointer-events:none;opacity:.92}
.drop-zone-inner{max-width:420px;margin:0 auto}
.drop-icon{display:block;margin:0 auto 10px;color:#5f6368}
.drop-icon svg{width:36px;height:36px;display:block;margin:0 auto}
.drop-text{font-size:14px;color:#5f6368;line-height:1.45}
.drop-zone.dragover .drop-text{color:#1a73e8;font-weight:600}
.upload-progress-wrap{margin-top:16px;height:4px;background:#e8eaed;border-radius:2px;overflow:hidden}
.upload-progress-bar{height:100%;width:30%;background:#1a73e8;border-radius:2px;animation:upload-indet 1s ease-in-out infinite}
@keyframes upload-indet{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.upload-hint-foot{font-size:11px;color:#9aa0a6;margin-top:12px}
.upload-msg{background:#e6f4ea;border:1px solid #ceead6;color:#137333;padding:12px 16px;border-radius:10px;margin-top:14px;font-size:14px;display:none}
.upload-msg.err-msg{background:#fce8e6;border-color:#f5c6c0;color:#c5221f}
.filter-row{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;padding:12px 14px;border-bottom:1px solid #f1f3f4;background:#fafbfc}
.tabs-brand{display:flex;flex-wrap:wrap;gap:6px}
.tab-brand{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1.5px solid #dadce0;background:#fff;color:#5f6368;cursor:pointer;transition:all .15s}
.tab-brand:hover{border-color:#1a73e8;color:#1a73e8}
.tab-brand.on{background:#1a73e8;color:#fff;border-color:#1a73e8}
.filter-row select,.filter-row input[type=search]{padding:7px 10px;border:1px solid #dadce0;border-radius:8px;font-size:12px;min-width:140px}
.filter-row input[type=search]{min-width:200px;flex:1;max-width:320px}
.sched-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:16px}
.sched-card{background:linear-gradient(135deg,#fff 0%,#f8f9ff 100%);border:1px solid #e8eaed;border-radius:16px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sched-card h3{font-size:14px;font-weight:700;margin-bottom:12px;color:#202124;line-height:1.35}
.sched-meta{font-size:12px;color:#5f6368;margin-bottom:6px;display:flex;justify-content:space-between;gap:8px}
.sched-meta b{color:#202124;font-weight:600}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid #f1f3f4}
.toggle-label{font-size:12px;font-weight:600;color:#5f6368}
.btn-toggle{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.btn-toggle.on{background:#34a853;color:#fff}
.btn-toggle.off{background:#dadce0;color:#5f6368}
.btn-toggle:disabled{opacity:.5;cursor:wait}
.link-sku{color:#1a73e8;text-decoration:none}
.link-sku:hover{text-decoration:underline}
</style>
</head>
<body>
<header class="header">
  <div>
    <h1>Price Monitor</h1>
    <div class="sub">쿠팡 SKU 가격 수집 현황</div>
  </div>
  <span class="sub" id="refreshed"></span>
</header>
<div class="wrap">
  <div id="errBox" class="err" style="display:none"></div>
  <div class="summary-row" id="summary"></div>

  <div class="upload-collapsible">
    <button type="button" class="upload-collapse-hdr" id="uploadCollapseToggle" aria-expanded="false" aria-controls="uploadCollapseBody">
      <span>📁 SKU CSV 업로드</span>
      <span class="chev" aria-hidden="true">▼</span>
    </button>
    <div class="upload-collapse-body" id="uploadCollapseBody" hidden>
      <input type="file" id="csvFile" accept=".csv,text/csv" hidden />
      <div class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="CSV 파일 선택 또는 끌어다 놓기">
        <div class="drop-zone-inner">
          <span class="drop-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          </span>
          <p class="drop-text" id="dropText">CSV 파일을 여기에 끌어다 놓으세요</p>
          <div class="upload-progress-wrap" id="uploadProgress" style="display:none" aria-hidden="true">
            <div class="upload-progress-bar indeterminate"></div>
          </div>
          <p class="upload-hint-foot">클릭하여 선택 · 브랜드, SKU ID, SKU 명 형식 (sales-monitor와 동일)</p>
        </div>
      </div>
      <div id="uploadResult" class="upload-msg" role="status"></div>
    </div>
  </div>

  <h2 class="stitle">브랜드별 수집 현황</h2>
  <div class="panel">
    <div class="twrap">
      <table class="data" id="brandTable">
        <thead><tr><th>브랜드</th><th class="num">등록 SKU</th><th class="num">금일 수집</th><th class="num">수집 대기</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <h2 class="stitle">최근 가격 변동</h2>
  <div class="panel">
    <div class="twrap">
      <table class="data" id="alertTable">
        <thead><tr><th>시각</th><th>브랜드</th><th>상품</th><th class="num">이전</th><th class="num">변경</th><th class="num">변동률</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <h2 class="stitle">SKU 목록</h2>
  <div class="panel">
    <div class="filter-row">
      <div class="tabs-brand" id="brandTabs"></div>
      <label class="muted" style="display:flex;align-items:center;gap:6px">
        플래그
        <select id="flagFilter"></select>
      </label>
      <label class="muted" style="display:flex;align-items:center;gap:6px">
        정렬
        <select id="sortSku">
          <option value="brand">브랜드 → SKU</option>
          <option value="name">상품명</option>
          <option value="chg_desc">변동률 높은순</option>
          <option value="chg_asc">변동률 낮은순</option>
        </select>
      </label>
      <input type="search" id="skuSearch" placeholder="상품명 검색" autocomplete="off" />
    </div>
    <div class="twrap">
      <table class="data" id="skuTable">
        <thead>
          <tr>
            <th>브랜드</th>
            <th>SKU ID</th>
            <th>상품명</th>
            <th class="num">등록가</th>
            <th class="num">현재가</th>
            <th class="num">변동</th>
            <th>메모</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <h2 class="stitle">수집 스케줄 관리</h2>
  <div class="panel">
    <div class="sched-grid" id="schedCards"></div>
  </div>
</div>
<script>
const API = '';
const BRAND_TABS = ['전체', '아리코', '윰', '건우코리아'];

let cacheDetail = null;
let savedBrandTab = '전체';

function ymd(d) {
  return d.toISOString().slice(0, 10);
}
function addDays(iso, n) {
  const x = new Date(iso.slice(0, 10) + 'T12:00:00.000Z');
  x.setUTCDate(x.getUTCDate() + n);
  return ymd(x);
}
function isDue(lastCollected, cycle, todayStr) {
  if (!lastCollected) return true;
  const due = addDays(String(lastCollected).slice(0, 10), Number(cycle) || 7);
  return due <= todayStr;
}

async function fetchJson(path, opts) {
  const r = await fetch(API + path, opts);
  const j = await r.json().catch(() => ({}));
  if (!r.ok || j.ok === false) throw new Error(j.error || r.statusText || '요청 실패');
  return j;
}

async function postJson(path, body) {
  return fetchJson(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.style.display = 'block';
  el.textContent = msg;
}
function hideErr() {
  document.getElementById('errBox').style.display = 'none';
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSummary(total, todayDone, pending, alertCount) {
  document.getElementById('summary').innerHTML = `
    <div class="scard"><div class="sl">등록 SKU (활성)</div><div class="sv blue">${total}</div></div>
    <div class="scard"><div class="sl">금일 수집 완료</div><div class="sv green">${todayDone}</div></div>
    <div class="scard"><div class="sl">수집 대기</div><div class="sv">${pending}</div></div>
    <div class="scard"><div class="sl">가격 변동 (7일)</div><div class="sv red">${alertCount}</div></div>`;
}

function renderBrandTable(byBrand, todayStr) {
  const tb = document.querySelector('#brandTable tbody');
  const brands = Object.keys(byBrand).sort();
  if (!brands.length) {
    tb.innerHTML = '<tr><td colspan="4" class="empty">데이터 없음</td></tr>';
    return;
  }
  tb.innerHTML = brands.map((b) => {
    const g = byBrand[b];
    const pend = g.rows.filter((r) => isDue(r.last_collected, r.collect_cycle, todayStr)).length;
    const done = g.rows.filter((r) => r.last_collected && String(r.last_collected).slice(0, 10) === todayStr).length;
    return `<tr><td>${escapeHtml(b)}</td><td class="num">${g.rows.length}</td><td class="num">${done}</td><td class="num">${pend}</td></tr>`;
  }).join('');
}

function renderAlerts(alerts) {
  const tb = document.querySelector('#alertTable tbody');
  if (!alerts.length) {
    tb.innerHTML = '<tr><td colspan="6" class="empty">최근 변동 없음</td></tr>';
    return;
  }
  tb.innerHTML = alerts.map((a) => {
    const pct = a.change_pct;
    const cls = pct > 0 ? 'chg-up' : pct < 0 ? 'chg-down' : '';
    const sign = pct > 0 ? '+' : '';
    const dt = a.detected_at ? new Date(a.detected_at).toLocaleString('ko-KR') : '—';
    return `<tr>
      <td class="muted">${escapeHtml(dt)}</td>
      <td>${escapeHtml(a.brand)}</td>
      <td>${escapeHtml(a.sku_name || a.sku_id)}</td>
      <td class="num">${a.prev_price != null ? Number(a.prev_price).toLocaleString() : '—'}</td>
      <td class="num">${Number(a.new_price).toLocaleString()}</td>
      <td class="num ${cls}">${sign}${pct}%</td>
    </tr>`;
  }).join('');
}

function fmtVariation(row) {
  const reg = row.registered_price;
  const cur = row.current_price;
  const pct = row.change_pct;
  if (cur == null || reg == null || Number(reg) <= 0) return '—';
  if (pct == null) return '—';
  if (Math.abs(Number(pct)) < 0.005) return '—';
  if (pct > 0) return `<span class="chg-up">▲ ${pct}%</span>`;
  if (pct < 0) return `<span class="chg-down">▼ ${Math.abs(pct)}%</span>`;
  return '—';
}

function getSelectedBrandTab() {
  return savedBrandTab;
}

function uniqueFlagsFromDetail(detail) {
  const s = new Set();
  for (const r of detail.data || []) {
    if (r.flag) s.add(r.flag);
  }
  for (const g of detail.schedule_groups || []) {
    if (g.flag) s.add(g.flag);
  }
  return [...s].sort();
}

function renderBrandTabs() {
  const el = document.getElementById('brandTabs');
  const cur = savedBrandTab;
  el.innerHTML = BRAND_TABS.map((b) =>
    `<button type="button" class="tab-brand${cur === b ? ' on' : ''}" data-brand="${escapeHtml(b)}">${escapeHtml(b)}</button>`
  ).join('');
  el.querySelectorAll('.tab-brand').forEach((btn) => {
    btn.addEventListener('click', () => {
      savedBrandTab = btn.dataset.brand;
      el.querySelectorAll('.tab-brand').forEach((x) => x.classList.remove('on'));
      btn.classList.add('on');
      renderSkuTable();
    });
  });
}

function populateFlagSelect(detail) {
  const sel = document.getElementById('flagFilter');
  const prev = sel.value;
  const flags = uniqueFlagsFromDetail(detail);
  sel.innerHTML = '<option value="__ALL__">전체</option>' +
    flags.map((f) => `<option value="${encodeURIComponent(f)}">${escapeHtml(f)}</option>`).join('');
  if (prev && [...sel.options].some((o) => o.value === prev)) sel.value = prev;
}

function filterSkuRows(rows) {
  const brand = getSelectedBrandTab();
  const flagSel = document.getElementById('flagFilter').value;
  const q = (document.getElementById('skuSearch').value || '').trim().toLowerCase();
  return rows.filter((r) => {
    if (brand !== '전체' && r.brand !== brand) return false;
    if (flagSel !== '__ALL__') {
      const rf = r.flag || '';
      const want = decodeURIComponent(flagSel);
      if (rf !== want) return false;
    }
    if (q) {
      const name = (r.sku_name || '').toLowerCase();
      if (!name.includes(q)) return false;
    }
    return true;
  });
}

function sortSkuRows(rows, mode) {
  const copy = [...rows];
  if (mode === 'name') {
    copy.sort((a, b) => (a.sku_name || '').localeCompare(b.sku_name || '', 'ko') || a.sku_id.localeCompare(b.sku_id));
  } else if (mode === 'chg_desc') {
    copy.sort((a, b) => (Number(b.change_pct) || -9999) - (Number(a.change_pct) || -9999));
  } else if (mode === 'chg_asc') {
    copy.sort((a, b) => (Number(a.change_pct) || 9999) - (Number(b.change_pct) || 9999));
  } else {
    copy.sort((a, b) => (a.brand || '').localeCompare(b.brand || '', 'ko') || a.sku_id.localeCompare(b.sku_id));
  }
  return copy;
}

function renderSkuTable() {
  if (!cacheDetail) return;
  const tb = document.querySelector('#skuTable tbody');
  const mode = document.getElementById('sortSku').value;
  let rows = filterSkuRows(cacheDetail.data || []);
  rows = sortSkuRows(rows, mode);
  if (!rows.length) {
    tb.innerHTML = '<tr><td colspan="7" class="empty">조건에 맞는 SKU가 없습니다</td></tr>';
    return;
  }
  tb.innerHTML = rows.map((r) => {
    const url = r.product_url || `https://www.coupang.com/vp/products/${r.sku_id}`;
    const reg = r.registered_price != null ? Number(r.registered_price).toLocaleString() : '—';
    const cur = r.current_price != null ? Number(r.current_price).toLocaleString() : '—';
    return `<tr>
      <td>${escapeHtml(r.brand)}</td>
      <td><a class="link-sku" href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(r.sku_id)}</a></td>
      <td>${escapeHtml(r.sku_name || '—')}</td>
      <td class="num">${reg}</td>
      <td class="num">${cur}</td>
      <td class="num">${fmtVariation(r)}</td>
      <td class="muted">${escapeHtml(r.memo || '—')}</td>
    </tr>`;
  }).join('');
}

async function onScheduleToggle(brand, flag, makeActive, btn) {
  btn.disabled = true;
  try {
    await postJson('/api/sku-batch-toggle', { brand, flag, active: makeActive });
    await load();
  } catch (e) {
    showErr(e.message || String(e));
  } finally {
    btn.disabled = false;
  }
}

function renderScheduleCards(groups) {
  const el = document.getElementById('schedCards');
  if (!groups || !groups.length) {
    el.innerHTML = '<div class="empty" style="grid-column:1/-1">그룹 데이터 없음</div>';
    return;
  }
  const sorted = [...groups].sort((a, b) =>
    (a.brand || '').localeCompare(b.brand || '', 'ko') ||
    (a.flag || '').localeCompare(b.flag || '', 'ko')
  );
  el.innerHTML = sorted.map((g) => {
    const flagLabel = g.flag ? escapeHtml(g.flag) : '(플래그 없음)';
    const title = `${escapeHtml(g.brand == null || g.brand === '' ? '미지정' : g.brand)} · ${flagLabel}`;
    const last = g.last_collected || '—';
    const next = g.next_collect_due || '—';
    const on = g.all_active;
    const btnClass = on ? 'on' : 'off';
    const btnText = on ? '수집 ON' : '수집 OFF';
    const encBrand = encodeURIComponent(g.brand == null ? '' : g.brand);
    const encFlag = encodeURIComponent(g.flag || '');
    return `<div class="sched-card" data-benc="${encBrand}" data-fenc="${encFlag}">
      <h3>${title}</h3>
      <div class="sched-meta"><span>SKU 수</span><b>${g.sku_count}</b></div>
      <div class="sched-meta"><span>활성</span><b>${g.active_count} / ${g.sku_count}</b></div>
      <div class="sched-meta"><span>마지막 수집일</span><b>${last}</b></div>
      <div class="sched-meta"><span>다음 수집 예정</span><b>${next}</b></div>
      <div class="toggle-row">
        <span class="toggle-label">일괄 수집</span>
        <button type="button" class="btn-toggle ${btnClass}" data-active="${on}">${btnText}</button>
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.sched-card').forEach((card) => {
    const btn = card.querySelector('.btn-toggle');
    const brand = decodeURIComponent(card.dataset.benc || '');
    const flag = decodeURIComponent(card.dataset.fenc || '');
    btn.addEventListener('click', () => {
      const currentlyOn = btn.dataset.active === 'true';
      onScheduleToggle(brand, flag, !currentlyOn, btn);
    });
  });
}

function bindSkuFiltersOnce() {
  if (bindSkuFiltersOnce.done) return;
  bindSkuFiltersOnce.done = true;
  document.getElementById('flagFilter').addEventListener('change', () => renderSkuTable());
  document.getElementById('sortSku').addEventListener('change', () => renderSkuTable());
  document.getElementById('skuSearch').addEventListener('input', () => renderSkuTable());
}

async function load() {
  hideErr();
  const todayStr = ymd(new Date());

  const [detailRes, dueRes, alertRes] = await Promise.all([
    fetchJson('/api/sku-detail'),
    fetchJson('/api/sku-list?due=1'),
    fetchJson('/api/price-alert?days=7'),
  ]);

  cacheDetail = detailRes;
  const list = detailRes.data || [];
  const pending = dueRes.count ?? (dueRes.data || []).length;
  const todayDone = list.filter(
    (r) => r.last_collected && String(r.last_collected).slice(0, 10) === todayStr
  ).length;

  renderSummary(list.length, todayDone, pending, (alertRes.alerts || []).length);

  const byBrand = {};
  for (const r of list) {
    const b = r.brand || '(미지정)';
    if (!byBrand[b]) byBrand[b] = { rows: [] };
    byBrand[b].rows.push({
      last_collected: r.last_collected,
      collect_cycle: r.collect_cycle,
    });
  }
  renderBrandTable(byBrand, todayStr);
  renderAlerts(alertRes.alerts || []);

  bindSkuFiltersOnce();
  renderBrandTabs();
  populateFlagSelect(detailRes);
  renderSkuTable();
  renderScheduleCards(detailRes.schedule_groups || []);

  document.getElementById('refreshed').textContent =
    '갱신: ' + new Date().toLocaleString('ko-KR');
}

let uploadSuccessTimer = null;
let uploadBusy = false;
let dragDepth = 0;

const DROP_IDLE = 'CSV 파일을 여기에 끌어다 놓으세요';
const DROP_HOVER = '여기에 놓으세요';

function showUploadMsg(text, isErr) {
  const el = document.getElementById('uploadResult');
  el.style.display = 'block';
  el.textContent = text;
  el.classList.toggle('err-msg', !!isErr);
}

function hideUploadMsg() {
  const el = document.getElementById('uploadResult');
  el.style.display = 'none';
  el.textContent = '';
  el.classList.remove('err-msg');
}

function setDropText(text) {
  document.getElementById('dropText').textContent = text;
}

function setUploading(on) {
  const dz = document.getElementById('dropZone');
  const bar = document.getElementById('uploadProgress');
  if (on) {
    dz.classList.add('uploading');
    bar.style.display = 'block';
    bar.setAttribute('aria-hidden', 'false');
    setDropText('업로드 중…');
  } else {
    dz.classList.remove('uploading');
    bar.style.display = 'none';
    bar.setAttribute('aria-hidden', 'true');
    setDropText(DROP_IDLE);
  }
}

function clearUploadSuccessTimer() {
  if (uploadSuccessTimer) {
    clearTimeout(uploadSuccessTimer);
    uploadSuccessTimer = null;
  }
}

async function performUpload(file) {
  if (!file || uploadBusy) return;
  uploadBusy = true;
  clearUploadSuccessTimer();
  hideUploadMsg();
  hideErr();
  setUploading(true);

  try {
    const fd = new FormData();
    fd.append('file', file, file.name);
    const r = await fetch(API + '/api/sku-upload', { method: 'POST', body: fd });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.ok === false) {
      throw new Error(j.error || r.statusText || '업로드 실패');
    }
    setUploading(false);
    const total = j.total ?? 0;
    const ins = j.inserted ?? 0;
    const upd = j.updated ?? 0;
    showUploadMsg(`✅ ${total}건 등록 (신규 ${ins}, 업데이트 ${upd})`, false);
    uploadSuccessTimer = setTimeout(async () => {
      uploadSuccessTimer = null;
      hideUploadMsg();
      try {
        await load();
      } catch (e) {
        showErr(e.message || String(e));
      }
    }, 3000);
  } catch (e) {
    setUploading(false);
    showUploadMsg(e.message || String(e), true);
  } finally {
    uploadBusy = false;
  }
}

(function initUploadUi() {
  const uploadToggle = document.getElementById('uploadCollapseToggle');
  const uploadBody = document.getElementById('uploadCollapseBody');
  uploadToggle.addEventListener('click', () => {
    const open = uploadToggle.getAttribute('aria-expanded') === 'true';
    const next = !open;
    uploadToggle.setAttribute('aria-expanded', String(next));
    if (next) uploadBody.removeAttribute('hidden');
    else uploadBody.setAttribute('hidden', '');
  });

  const dropZone = document.getElementById('dropZone');
  const csvFile = document.getElementById('csvFile');

  dropZone.addEventListener('click', () => {
    if (uploadBusy) return;
    csvFile.click();
  });

  dropZone.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (!uploadBusy) csvFile.click();
    }
  });

  dropZone.addEventListener('dragenter', (e) => {
    if (uploadBusy) return;
    e.preventDefault();
    e.stopPropagation();
    dragDepth++;
    dropZone.classList.add('dragover');
    setDropText(DROP_HOVER);
  });

  dropZone.addEventListener('dragleave', (e) => {
    if (uploadBusy) return;
    e.preventDefault();
    e.stopPropagation();
    dragDepth--;
    if (dragDepth <= 0) {
      dragDepth = 0;
      dropZone.classList.remove('dragover');
      setDropText(DROP_IDLE);
    }
  });

  dropZone.addEventListener('dragover', (e) => {
    if (uploadBusy) return;
    e.preventDefault();
    e.stopPropagation();
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dragDepth = 0;
    dropZone.classList.remove('dragover');
    if (!uploadBusy) setDropText(DROP_IDLE);
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) performUpload(f);
  });

  csvFile.addEventListener('change', (ev) => {
    const file = ev.target.files && ev.target.files[0];
    ev.target.value = '';
    if (file) performUpload(file);
  });
})();

load().catch((e) => showErr(e.message || String(e)));
setInterval(() => load().catch((e) => showErr(e.message)), 120000);
</script>
