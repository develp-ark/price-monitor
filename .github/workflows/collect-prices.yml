name: Collect Prices

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect Coupang prices
        run: npm run collect-prices
        env:
          GITHUB_ACTIONS: 'true'
          PRICE_API_URL: https://price-monitor-mocha.vercel.app
